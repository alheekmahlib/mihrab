name: mihrab_web
description: Mihrab Web — Landing page and device dashboard for the web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  mihrab_shared:
    path: ../mihrab_shared
  supabase_flutter: ^2.9.0
  mobile_scanner: ^7.0.0
  geolocator: ^14.0.0
  get: ^4.7.3
  get_storage: ^2.1.1
  gap: ^3.0.1
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  http: ^1.2.0
  web: ^1.1.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
