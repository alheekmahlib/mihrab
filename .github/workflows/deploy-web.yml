name: Deploy Mihrab Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env file
        run: |
          echo "url=${{ secrets.SUPABASE_URL }}" > mihrab_shared/.env
          echo "anonKey=${{ secrets.SUPABASE_ANON_KEY }}" >> mihrab_shared/.env

      - name: Get dependencies (shared)
        run: flutter pub get
        working-directory: mihrab_shared

      - name: Get dependencies (tv)
        run: flutter pub get
        working-directory: mihrab_tv

      - name: Get dependencies (web)
        run: flutter pub get
        working-directory: mihrab_web

      - name: Build mihrab_tv for web
        run: flutter build web --release --base-href "/tv/"
        working-directory: mihrab_tv

      - name: Copy TV build to mihrab_web
        run: |
          rm -rf mihrab_web/web/tv
          mkdir -p mihrab_web/web/tv
          cp -r mihrab_tv/build/web/* mihrab_web/web/tv/

      - name: Inject fullscreen button
        run: |
          cat >> /tmp/fullscreen.html << 'FSEOF'
            <style>
              #fullscreen-btn{position:fixed;bottom:20px;right:20px;z-index:99999;width:48px;height:48px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.4;transition:opacity .3s}
              #fullscreen-btn:hover{opacity:1}
              #fullscreen-btn svg{width:24px;height:24px;fill:#fff}
            </style>
            <button id="fullscreen-btn" title="Toggle Fullscreen">
              <svg id="fs-enter" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
              <svg id="fs-exit" viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
            </button>
            <script>
              (function(){var b=document.getElementById("fullscreen-btn"),e=document.getElementById("fs-enter"),x=document.getElementById("fs-exit");function u(){var f=!!document.fullscreenElement;e.style.display=f?"none":"block";x.style.display=f?"block":"none"}b.addEventListener("click",function(){document.fullscreenElement?document.exitFullscreen().catch(function(){}):document.documentElement.requestFullscreen().catch(function(){})});document.addEventListener("fullscreenchange",u)})();
            </script>
          FSEOF
          sed -i 's|</body>|'"$(cat /tmp/fullscreen.html)"'</body>|' mihrab_web/web/tv/index.html

      - name: Build mihrab_web
        run: flutter build web --release
        working-directory: mihrab_web

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mihrab_web/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
