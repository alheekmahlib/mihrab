name: mihrab_shared
description: Shared models, constants, enums, widgets and theme for Mihrab TV & Dashboard apps.
version: 1.0.0

environment:
  sdk: ^3.11.3
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  get_storage: ^2.1.1
  gap: ^3.0.1
  adhan: ^2.0.0+1
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  hijri_date: ^1.0.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

flutter:
  uses-material-design: true
  fonts:
    - family: PlaypenSansArabic
      fonts:
        - asset: assets/fonts/PlaypenSansArabic-Regular.ttf
        - asset: assets/fonts/PlaypenSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlaypenSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlaypenSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlaypenSansArabic-Light.ttf
          weight: 300
